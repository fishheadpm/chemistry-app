<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>化学式アプリ</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    .box {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>
  <h1>化学式アプリ</h1>

  <div class="box">
    <p>GitHub Pages の表示確認です 👍</p>
    <p>ここが表示されれば成功です！</p>
  </div>
</body>
</html>
